{% extends 'base_kullanici.html' %}

{% block title %}Giriş Yap{% endblock %}

{% block content %}
<div class="container" style="padding: 60px 0;">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow" style="border: none; border-radius: 12px;">
                <div class="card-body" style="padding: 40px;">

                    <h3 class="text-center" style="margin-bottom: 10px;">Giriş Yap</h3>
                    <p class="text-center text-muted" style="margin-bottom: 30px;">
                        Kelime Kartı'na tekrar hoş geldin
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <div class="form-group" style="margin-bottom: 20px;">
                            <label>Kullanıcı Adı</label>
                            <input type="text" name="username" class="form-control" placeholder="kullanici_adi" required>
                        </div>

                        <div class="form-group" style="margin-bottom: 25px;">
                            <label>Şifre</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 10px;">
                            Giriş Yap
                        </button>
                    </form>

                    <p class="text-center" style="margin-top: 20px;">
                        Hesabın yok mu? <a href="{% url 'kayit_ol' %}">Kayıt Ol</a>
                    </p>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
