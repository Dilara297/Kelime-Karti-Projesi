{% extends 'base_kullanici.html' %}

{% block title %}Profilim{% endblock %}

{% block content %}
<div class="container" style="padding:60px 0;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div style="background:#ddc24e; border-radius:16px; padding:40px; box-shadow:0 4px 20px rgba(0,0,0,0.12); text-align:center;">

                <div style="width:90px; height:90px; border-radius:50%; background:#1a1a2e; color:#ddc24e; font-size:36px; font-weight:bold; display:flex; align-items:center; justify-content:center; margin:0 auto 20px auto;">
                    {{ user.username|first|upper }}
                </div>

                <h3 style="color:#1a1a2e; margin-bottom:5px;">{{ user.username }}</h3>
                <p style="color:#444; margin-bottom:30px;">{{ user.email }}</p>

                <div style="background:#fff; border-radius:12px; padding:20px; text-align:left;">
                    <p style="margin-bottom:10px;"><strong>Üyelik Tarihi:</strong> {{ user.date_joined|date:"d.m.Y" }}</p>
                    <p style="margin-bottom:0;"><strong>Oluşturduğun Liste Sayısı:</strong> {{ user.listeler.count }}</p>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
