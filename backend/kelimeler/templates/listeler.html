{% load static %}
<!DOCTYPE html>
<html lang="en">
   <head>
      <!-- basic -->
      <meta charset="utf-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <!-- mobile metas -->
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <meta name="viewport" content="initial-scale=1, maximum-scale=1">
      <!-- site metas -->
      <title>Listeler</title>
      <meta name="keywords" content="">
      <meta name="description" content="">
      <meta name="author" content="">
      <!-- bootstrap css -->
      <link rel="stylesheet" type="text/css" href="{% static 'kelimeler/css/bootstrap.min.css' %}">
      <!-- style css -->
      <link rel="stylesheet" type="text/css" href="{% static 'kelimeler/css/style.css' %}">
      <!-- Responsive-->
      <link rel="stylesheet" href="{% static 'kelimeler/css/responsive.css' %}">
      <!-- fevicon -->
      <link rel="icon" href="{% static 'kelimeler/images/fevicon.png' %}" type="image/gif" />
      <!-- Scrollbar Custom CSS -->
      <link rel="stylesheet" href="{% static 'kelimeler/css/jquery.mCustomScrollbar.min.css' %}">
      <!-- Tweaks for older IEs-->
      <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css">
      <!-- owl stylesheets --> 
      <link rel="stylesheet" href="{% static 'kelimeler/css/owl.carousel.min.css' %}">
      <link rel="stylesheet" href="{% static 'kelimeler/css/owl.theme.default.min.css' %}">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.css" media="screen">
   </head>
   <body>
      <!--header section start -->
      <div class="header_section">
         <div class="container-fluid">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
               <div class="logo"><a href="{% url 'liste_gorunumu' %}"><img src="{% static 'kelimeler/images/logo.png' %}"></a></div>
               <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
               <span class="navbar-toggler-icon"></span>
               </button>
               <div class="collapse navbar-collapse" id="navbarSupportedContent">
                  <ul class="navbar-nav mr-auto">
   <li class="nav-item active">
      <a class="nav-link" href="{% url 'liste_gorunumu' %}">
         Ana Sayfa
      </a>
   </li>

   <li class="nav-item">
      <a class="nav-link" href="/admin/">
         Admin
      </a>
   </li>

   <li class="nav-item">
      <a class="nav-link" href="/api/kelimeler/">
         API
      </a>
   </li>
</ul>
               </div>
            </nav>
         </div>
         <!--banner section start -->
         <div class="banner_section layout_padding">
            <div class="container">
               <div id="carouselExampleSlidesOnly" class="carousel slide" data-ride="carousel">
                  <div class="carousel-inner">
                     <div class="carousel-item active">
                        <p class="banner_text">Kelime Defteri</p>
                        <h1 class="banner_taital">Kelime <br>listelerin burada</h1>
                        <div class="read_bt"><a href="#">Listeleri Gör</a></div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
         <!--banner section end -->
      </div>
      <!--header section end -->

      <!--listeler section start -->
      <div class="language_section layout_padding">
         <div class="container">
            <h1 class="language_taital">Kelime Listelerim</h1>
            <div class="language_section_2 layout_padding">
               <div class="row">
                  {% for liste in listeler %}
                  <div class="col-lg-3 col-sm-6">
                     <div class="box_main">
                        <h6 class="heavy_text">{{ liste.name }}</h6>
                     </div>
                     <div class="readmore_bt"><a href="{% url 'kelime_gorunumu' liste.id %}">Listeyi Aç</a></div>
                  </div>
                  {% endfor %}
               </div>
            </div>
         </div>
      </div>
      <!--listeler section end -->

      <!-- Javascript files-->
      <script src="{% static 'kelimeler/js/jquery.min.js' %}"></script>
      <script src="{% static 'kelimeler/js/popper.min.js' %}"></script>
      <script src="{% static 'kelimeler/js/bootstrap.bundle.min.js' %}"></script>
      <script src="{% static 'kelimeler/js/jquery-3.0.0.min.js' %}"></script>
      <script src="{% static 'kelimeler/js/plugin.js' %}"></script>
      <!-- sidebar -->
      <script src="{% static 'kelimeler/js/jquery.mCustomScrollbar.concat.min.js' %}"></script>
      <script src="{% static 'kelimeler/js/custom.js' %}"></script>
      <!-- javascript --> 
      <script src="{% static 'kelimeler/js/owl.carousel.js' %}"></script>
      <script src="https:cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.js"></script>
   </body>
</html>
