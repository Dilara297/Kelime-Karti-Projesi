{% extends 'admin_paneli/base_admin.html' %}
{% load static %}

{% block title %}Panel - Kelime Kartı{% endblock %}

{% block content %}
<div class="d-sm-flex align-items-center justify-content-between mb-4">
  <h1 class="h3 mb-0 text-gray-800">Yönetim Paneli</h1>
</div>

<div class="row">
  <div class="col-xl-3 col-md-6 mb-4">
    <div class="card border-left-primary shadow h-100 py-2">
      <div class="card-body">
        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
          Toplam Liste
        </div>
        <div class="h5 mb-0 font-weight-bold text-gray-800">
          {{ toplam_liste }}
        </div>
      </div>
    </div>
  </div>
  <div class="col-xl-3 col-md-6 mb-4">
    <div class="card border-left-success shadow h-100 py-2">
      <div class="card-body">
        <div class="text-xs font-weight-bold text-success text-uppercase mb-1">
          Toplam Kelime
        </div>
        <div class="h5 mb-0 font-weight-bold text-gray-800">
          {{ toplam_kelime }}
        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}
{% block extra_js %}
<script src="{% static 'admin/vendor/chart.js/Chart.min.js' %}"></script>
<script src="{% static 'admin/js/demo/chart-area-demo.js' %}"></script>
{% endblock %}
